name: .NET Core WinForms Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Optional: run on tags for releases
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]

    env:
      Solution_Name: LibreLinkUp_Windows.sln
      Project_Path: LibreLinkUp_Windows.csproj

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Clean and restore
    - name: Clean solution
      run: dotnet clean $env:Solution_Name

    - name: Restore dependencies
      run: dotnet restore $env:Solution_Name

    # Build
    - name: Build solution
      run: dotnet build $env:Solution_Name --configuration ${{ matrix.configuration }} --no-restore

    # Publish
    - name: Publish application
      run: dotnet publish $env:Project_Path --configuration ${{ matrix.configuration }} --output ./publish

    # Verify output
    - name: List published files
      run: dir ./publish

    # Package artifacts
    - name: Create ZIP of build
      run: Compress-Archive -Path ./publish/* -DestinationPath LibreLinkUp_Portable.zip

    # Upload to GitHub Release (optional)
    - name: Upload ZIP to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: LibreLinkUp_Portable.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
